<!DOCTYPE html>
<html lang="th" data-theme="light">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CheatVault — โปรไฟล์</title>
<link rel="stylesheet" href="public/css/style.css"/>
<style>
.profile-avatar-wrap{position:relative;display:inline-block}
.profile-avatar-lg{width:80px;height:80px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#fff;overflow:hidden;border:3px solid var(--surface);box-shadow:var(--shadow-sm)}
.profile-avatar-lg img{width:100%;height:100%;object-fit:cover}
.avatar-upload-btn{position:absolute;bottom:0;right:0;width:26px;height:26px;border-radius:50%;background:var(--surface);border:1px solid var(--border-2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-2);box-shadow:var(--shadow-sm);transition:all var(--t)}.avatar-upload-btn:hover{background:var(--bg-2)}
.reset-notice{background:rgba(255,122,0,0.06);border:1px solid rgba(255,122,0,0.2);border-radius:var(--r-sm);padding:10px 14px;font-size:12.5px;color:var(--text-2);margin-bottom:14px}
.reset-code{font-family:monospace;font-size:16px;font-weight:700;color:var(--accent);letter-spacing:0.08em}
.reset-timer{font-size:11px;color:var(--text-3);margin-top:3px}
</style>
</head>
<body>
<div class="app-layout">
  <div id="sidebar-overlay"></div>
  <nav class="navbar">
    <button class="btn-icon" id="sidebar-toggle"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <div class="navbar-brand"><div class="brand-dot"></div>CheatVault<span class="navbar-subtitle">· KMUTT CSE</span></div>
    <div class="navbar-spacer"></div>
    <button class="btn-icon" id="theme-toggle"><svg class="icon-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg><svg class="icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></button>
    <div class="nav-profile-wrap">
      <button class="nav-profile-btn" id="nav-profile-btn"><div class="nav-avatar" id="nav-avatar">?</div><span class="nav-name" id="nav-name">...</span><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></button>
      <div class="nav-dropdown" id="nav-dropdown">
        <div class="nav-dropdown-header"><div class="nav-dropdown-name" id="nd-name">—</div><div class="nav-dropdown-id" id="nd-sid">—</div></div>
        <div class="nav-dropdown-item active" id="nd-profile"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>โปรไฟล์</div>
        <div class="nav-dropdown-divider"></div>
        <div class="nav-dropdown-item danger" id="nd-logout"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>ออกจากระบบ</div>
      </div>
    </div>
  </nav>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-item" onclick="history.back()"><svg class="item-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>กลับ</div>
      <div class="sidebar-item active"><svg class="item-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>โปรไฟล์</div>
    </div>
  </aside>
  <main class="main-content"><div class="page-body" style="max-width:580px">
    <div class="page-header"><h1 class="page-title">โปรไฟล์</h1><p class="page-sub">ข้อมูลส่วนตัวและการตั้งค่าบัญชี</p></div>
    <div class="card p-4" style="margin-bottom:13px">
      <div class="flex items-center gap-3" style="margin-bottom:20px">
        <div class="profile-avatar-wrap">
          <div class="profile-avatar-lg" id="profile-avatar">?</div>
          <label class="avatar-upload-btn" for="avatar-input" title="เปลี่ยนรูป"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></label>
          <input type="file" id="avatar-input" accept="image/*" style="display:none"/>
        </div>
        <div>
          <div style="font-size:17px;font-weight:600" id="profile-name">—</div>
          <div style="font-size:12px;color:var(--text-3);margin-top:2px;font-family:monospace" id="profile-sid">—</div>
          <div style="margin-top:6px"><span class="tag" id="profile-role-tag">—</span></div>
        </div>
      </div>
      <div style="display:grid;gap:12px">
        <div class="input-group"><label class="input-label">ชื่อ-นามสกุล</label><input class="input" id="edit-name" type="text"/></div>
        <div class="input-group"><label class="input-label">ชั้นปี</label><select class="input" id="edit-year"><option value="">ไม่ระบุ</option><option value="1">ปี 1</option><option value="2">ปี 2</option><option value="3">ปี 3</option><option value="4">ปี 4</option></select></div>
      </div>
      <div style="margin-top:14px;display:flex;justify-content:flex-end"><button class="btn btn-primary btn-sm" id="save-profile-btn">บันทึกข้อมูล</button></div>
    </div>
    <div class="card p-4" style="margin-bottom:13px">
      <h3 style="font-size:14px;font-weight:600;margin-bottom:14px">เปลี่ยนรหัสผ่าน</h3>
      <div id="reset-notice" class="reset-notice" style="display:none">
        <div style="font-size:12px;font-weight:500;margin-bottom:4px">รหัสผ่านชั่วคราวจากรุ่นพี่</div>
        <div class="reset-code" id="reset-code-display">—</div>
        <div class="reset-timer" id="reset-timer">—</div>
      </div>
      <div style="display:grid;gap:12px">
        <div class="input-group"><label class="input-label">รหัสผ่านปัจจุบัน (หรือรหัสชั่วคราว)</label><input class="input" id="pw-old" type="password" placeholder="••••••••"/></div>
        <div class="input-group"><label class="input-label">รหัสผ่านใหม่</label><input class="input" id="pw-new" type="password" placeholder="อย่างน้อย 8 ตัวอักษร"/></div>
        <div class="input-group"><label class="input-label">ยืนยันรหัสผ่านใหม่</label><input class="input" id="pw-new2" type="password" placeholder="พิมพ์ซ้ำ"/></div>
      </div>
      <div style="margin-top:14px;display:flex;justify-content:flex-end"><button class="btn btn-primary btn-sm" id="save-pw-btn">เปลี่ยนรหัสผ่าน</button></div>
    </div>
    <div class="card p-4">
      <h3 style="font-size:14px;font-weight:600;margin-bottom:14px">ข้อมูลบัญชี</h3>
      <div style="display:grid;gap:10px;font-size:13px">
        <div class="flex justify-between"><span class="text-secondary">รหัสนักศึกษา</span><span class="font-mono" id="info-sid">—</span></div>
        <div class="flex justify-between"><span class="text-secondary">สิทธิ์</span><span id="info-role">—</span></div>
        <div class="flex justify-between"><span class="text-secondary">ชั้นปี</span><span id="info-year">—</span></div>
      </div>
    </div>
  </div></main>
</div>
<script src="public/js/config.js"></script>
<script src="public/js/ui.js"></script>
<script src="public/js/auth.js"></script>
<script src="public/js/drive.js"></script>
<script>
(function(){
  const session=Auth.requireAuth();if(!session)return;
  UI.initTheme();
  document.querySelectorAll(".icon-moon").forEach(e=>e.style.display=UI.getTheme()==="dark"?"none":"block");
  document.querySelectorAll(".icon-sun").forEach(e=>e.style.display=UI.getTheme()==="dark"?"block":"none");
  const sbar=document.getElementById("sidebar"),tog=document.getElementById("sidebar-toggle"),ovl=document.getElementById("sidebar-overlay");
  tog?.addEventListener("click",()=>{sbar?.classList.toggle("open");ovl?.classList.toggle("show");});
  ovl?.addEventListener("click",()=>{sbar?.classList.remove("open");ovl?.classList.remove("show");});
  document.getElementById("theme-toggle")?.addEventListener("click",()=>{UI.toggleTheme();document.querySelectorAll(".icon-moon").forEach(e=>e.style.display=UI.getTheme()==="dark"?"none":"block");document.querySelectorAll(".icon-sun").forEach(e=>e.style.display=UI.getTheme()==="dark"?"block":"none");});
  const name=session.name||session.studentId;
  const av=document.getElementById("profile-avatar");if(av){if(session.avatarUrl)av.innerHTML=`<img src="${session.avatarUrl}" alt="avatar"/>`;else av.textContent=name[0].toUpperCase();}
  // Nav dropdown
  const btn=document.getElementById("nav-profile-btn"),dd=document.getElementById("nav-dropdown");
  ["nav-name","nd-name"].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=name;});
  ["profile-sid","nd-sid","info-sid"].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=session.studentId;});
  const navAv=document.getElementById("nav-avatar");if(navAv){if(session.avatarUrl)navAv.innerHTML=`<img src="${session.avatarUrl}" alt="avatar"/>`;else navAv.textContent=name[0].toUpperCase();}
  let ddOpen=false;btn?.addEventListener("click",e=>{e.stopPropagation();ddOpen=!ddOpen;dd?.classList.toggle("show",ddOpen);});document.addEventListener("click",()=>{ddOpen=false;dd?.classList.remove("show");});
  document.getElementById("nd-logout")?.addEventListener("click",e=>{e.stopPropagation();dd?.classList.remove("show");UI.confirm("ต้องการออกจากระบบ?",()=>Auth.logout());});
  document.getElementById("nd-profile")?.addEventListener("click",e=>{e.stopPropagation();dd?.classList.remove("show");});
  const rt=document.getElementById("profile-role-tag");if(rt){rt.textContent=session.role==="senior"?"Senior 🔑":"Junior";rt.className=`tag ${session.role==="senior"?"tag-final":"tag-lecture"}`;}
  const en=document.getElementById("edit-name");if(en)en.value=session.name||"";
  const ey=document.getElementById("edit-year");if(ey)ey.value=session.year||"";
  const ir=document.getElementById("info-role");if(ir)ir.textContent=session.role==="senior"?"Senior (Admin)":"Junior";
  const iy=document.getElementById("info-year");if(iy)iy.textContent=session.year?`ปี ${session.year}`:"ไม่ระบุ";
  document.getElementById("profile-name")?.textContent && (document.getElementById("profile-name").textContent=name);
  const pn=document.getElementById("profile-name");if(pn)pn.textContent=name;
  // Avatar upload
  document.getElementById("avatar-input")?.addEventListener("change",async function(){const f=this.files[0];if(!f)return;if(f.size>2*1024*1024){UI.toast("รูปต้องไม่เกิน 2MB","warning");return;}const reader=new FileReader();reader.readAsDataURL(f);reader.onload=async()=>{try{const res=await API.call("updateProfile",{studentId:session.studentId,avatarBase64:reader.result.split(",")[1],avatarMime:f.type});if(!res.success)throw new Error(res.message);const s=Auth.getSession();s.avatarUrl=res.avatarUrl;localStorage.setItem(CONFIG.SESSION_KEY,JSON.stringify(s));if(av)av.innerHTML=`<img src="${res.avatarUrl}" alt="avatar"/>`;if(navAv)navAv.innerHTML=`<img src="${res.avatarUrl}" alt="avatar"/>`;UI.toast("อัปโหลดรูปสำเร็จ","success");}catch(e){UI.toast(e.message||"ผิดพลาด","error");};};});
  // Save profile
  document.getElementById("save-profile-btn")?.addEventListener("click",async()=>{const n=document.getElementById("edit-name")?.value.trim(),y=document.getElementById("edit-year")?.value;if(!n){UI.toast("กรุณากรอกชื่อ","warning");return;}const btn2=document.getElementById("save-profile-btn");UI.setLoading(btn2,true);try{const res=await API.call("updateProfile",{studentId:session.studentId,name:n,year:y});if(!res.success)throw new Error(res.message);const s=Auth.getSession();s.name=n;s.year=y;localStorage.setItem(CONFIG.SESSION_KEY,JSON.stringify(s));UI.toast("บันทึกสำเร็จ","success");}catch(e){UI.toast(e.message||"ผิดพลาด","error");}finally{UI.setLoading(btn2,false);}});
  // Change password
  document.getElementById("save-pw-btn")?.addEventListener("click",async()=>{const op=document.getElementById("pw-old")?.value,np=document.getElementById("pw-new")?.value,np2=document.getElementById("pw-new2")?.value;if(!op||!np){UI.toast("กรุณากรอกให้ครบ","warning");return;}if(np.length<8){UI.toast("รหัสผ่านใหม่ต้องมีอย่างน้อย 8 ตัว","warning");return;}if(np!==np2){UI.toast("รหัสผ่านไม่ตรงกัน","warning");return;}const btn3=document.getElementById("save-pw-btn");UI.setLoading(btn3,true);try{const res=await API.call("changePassword",{studentId:session.studentId,oldPassword:op,newPassword:np});if(!res.success)throw new Error(res.message);["pw-old","pw-new","pw-new2"].forEach(id=>{const el=document.getElementById(id);if(el)el.value="";});const rn=document.getElementById("reset-notice");if(rn)rn.style.display="none";UI.toast("เปลี่ยนรหัสผ่านสำเร็จ","success");}catch(e){UI.toast(e.message||"รหัสผ่านเดิมไม่ถูกต้อง","error");}finally{UI.setLoading(btn3,false);}});
  // Check reset code for juniors
  if(session.role==="junior"){API.call("getResetCode",{studentId:session.studentId}).then(r=>{if(r.success&&r.code){const notice=document.getElementById("reset-notice");if(notice){notice.style.display="block";const cd=document.getElementById("reset-code-display");if(cd)cd.textContent=r.code;const tm=document.getElementById("reset-timer");if(tm&&r.expiresAt){const left=r.expiresAt-Date.now();const h=Math.floor(left/3600000),m=Math.floor((left%3600000)/60000);tm.textContent=`หมดอายุใน ${h} ชม. ${m} นาที`;}}};}).catch(()=>{});}
})();
</script>
</body>
</html>
