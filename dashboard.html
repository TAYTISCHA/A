<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CheatVault — KMUTT</title>
  <link rel="stylesheet" href="public/css/style.css"/>
</head>
<body>
<div class="app-layout">
  <div id="sidebar-overlay"></div>

  <nav class="navbar">
    <button class="btn-icon" id="sidebar-toggle"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <div class="navbar-brand"><div class="brand-dot"></div>CheatVault<span class="navbar-subtitle">· KMUTT CSE</span></div>
    <div class="navbar-spacer"></div>
    <div class="search-wrap" style="max-width:240px">
      <span class="search-icon"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
      <input class="input" id="global-search" type="text" placeholder="ค้นหาไฟล์, วิชา..."/>
    </div>
    <button class="btn-icon" id="theme-toggle">
      <svg id="icon-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg id="icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
    <div class="nav-profile-wrap">
      <button class="nav-profile-btn" id="nav-profile-btn">
        <div class="nav-avatar" id="nav-avatar">?</div>
        <span class="nav-name" id="nav-name">...</span>
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="nav-dropdown" id="nav-dropdown">
        <div class="nav-dropdown-header">
          <div class="nav-dropdown-name" id="nd-name">—</div>
          <div class="nav-dropdown-id" id="nd-sid">—</div>
        </div>
        <div class="nav-dropdown-divider"></div>
        <div class="nav-dropdown-item danger" id="nd-logout">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          ออกจากระบบ
        </div>
      </div>
    </div>
  </nav>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">หน้าหลัก</div>
      <div class="sidebar-item active" data-page="home">
        <svg class="item-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        หน้าแรก
      </div>
      <div class="sidebar-item" data-page="recent">
        <svg class="item-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        ดูล่าสุด
      </div>
      <div class="sidebar-item" data-page="bookmarks">
        <svg class="item-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
        Bookmarks
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">ปี</div>
      <div class="sidebar-item" data-filter-year="1">
        <svg class="item-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        ปี 1
      </div>
      <div class="sidebar-item" data-filter-year="2">
        <svg class="item-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        ปี 2
      </div>
      <div class="sidebar-item" data-filter-year="3">
        <svg class="item-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        ปี 3
      </div>
      <div class="sidebar-item" data-filter-year="4">
        <svg class="item-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        ปี 4
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">หมวดหมู่</div>
      <div class="sidebar-item" data-filter-cat="lecture">
        <svg class="item-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        บรรยาย
      </div>
      <div class="sidebar-item" data-filter-cat="lab">
        <svg class="item-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v11m0 0a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9m6 5h10m0 0a2 2 0 0 0 2-2V9m-2 5V9m0 0H9"/></svg>
        แลป
      </div>
      <div class="sidebar-item" data-filter-cat="midterm">
        <svg class="item-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        กลางภาค
      </div>
      <div class="sidebar-item" data-filter-cat="final">
        <svg class="item-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        ปลายภาค
      </div>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-body">
      <div id="announcements-container"></div>
      <div id="page-home">
        <div class="page-header">
          <h1 class="page-title" id="greeting">สวัสดี</h1>
          <p class="page-sub">เลือกดูไฟล์หรือค้นหาด้วยชื่อวิชา</p>
        </div>
        <div class="filter-bar">
          <div class="filter-chip active" data-filter="">ทั้งหมด</div>
          <div class="filter-chip" data-filter="lecture">บรรยาย</div>
          <div class="filter-chip" data-filter="lab">แลป</div>
          <div class="filter-chip" data-filter="midterm">กลางภาค</div>
          <div class="filter-chip" data-filter="final">ปลายภาค</div>
        </div>
        <div class="file-grid" id="file-grid"></div>
        <div class="pagination" id="pagination"></div>
      </div>
      <div id="page-recent" class="hidden">
        <div class="page-header"><h1 class="page-title">ดูล่าสุด</h1><p class="page-sub">ไฟล์ที่เปิดดูล่าสุด</p></div>
        <div class="file-grid" id="recent-grid"></div>
      </div>
      <div id="page-bookmarks" class="hidden">
        <div class="page-header"><h1 class="page-title">Bookmarks</h1><p class="page-sub">ไฟล์ที่บันทึกไว้</p></div>
        <div class="file-grid" id="bookmarks-grid"></div>
      </div>
    </div>
  </main>
</div>

<div class="modal pdf-modal" id="pdf-modal">
  <div class="modal-content">
    <div class="pdf-modal-header">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span class="pdf-modal-title" id="pdf-modal-title">ชื่อไฟล์</span>
      <button class="btn btn-ghost btn-sm" id="pdf-download-btn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="8 17 12 21 16 17"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.88 18.09A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.29"/></svg>
        ดาวน์โหลด
      </button>
      <button class="btn-icon" id="pdf-close-btn"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <iframe class="pdf-iframe" id="pdf-iframe" src=""></iframe>
  </div>
</div>

<script src="public/js/config.js"></script>
<script src="public/js/ui.js"></script>
<script src="public/js/auth.js"></script>
<script src="public/js/drive.js"></script>
<script src="public/js/app.js"></script>
<script src="public/js/pages/dashboard.js"></script>
</body>
</html>
